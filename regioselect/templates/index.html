<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
	<meta name="index" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie-edge">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
	<meta http-equiv="Pragma" content="no-cache"/>
	<meta http-equiv="Expires" content="0"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='image/icon.png') }}">
    <title>RegioSelect</title>
    
    <!-- == APPLICATION HEAD == -->
	<!-- GLOBAL styles -->
	<!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
		integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous"> -->
	<!-- == END APPLICATION HEAD == -->
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="/">
                <img src="{{ url_for('static', filename='image/logo.png') }}" alt="RegioSelect logo" class="logo-image">
            </a>
        </div>
        <div class="form-container">           
            
            <iframe id="ketcher-frame" src="{{ url_for('static', filename='ketcher-standalone-v2.20.0/index.html') }}" scrolling="no" style="width: 99.5%; height: 400px; border: 2px solid gray; border-radius: 5px; position: relative;"></iframe>

            {% if error %}
                <p class="error_message" style="color: red;">{{ error }}</p>
            {% endif %}
            
            <form method="POST" action="/" name="form1" class="form-group">
                <input type="hidden" id="field1" name="smiles">
                <input class="button" type="button" onclick="getsmi()" value="Predict">
            </form>
            
        </div>
        
        <div class="info-container">
            <h2>About RegioSelect</h2>
            <p>RegioSelect is an atom-based machine learning framework.</p>
        </div>
        
        <footer class="footnote">
            <p>©️ 2024 Jan H. Jensen Research Group of the Department of Chemistry, University of Copenhagen. Submit issues on <a href="https://github.com/jensengroup/regioselect">GitHub</a>.</p>
        </footer>
    </div>
    
    <script>
        async function getsmi() {
            ketcherFrame = document.getElementById('ketcher-frame')    
            if ('contentDocument' in ketcherFrame) {
                ketcher = ketcherFrame.contentWindow.ketcher;
            } else { // IE7
                ketcher = document.frames['ketcher-frame'].window.ketcher;
            }
            const smiles = await ketcher.getSmiles();
            document.getElementById("field1").value = smiles;
            document.form1.submit();
        }
    </script>
</body>
</html>
